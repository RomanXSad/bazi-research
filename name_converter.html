<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Name Converter 中文名转换器</title>
<style>
:root {
  --bg: #f8f7f4;
  --card: #ffffff;
  --text: #2c2c2c;
  --accent: #c0392b;
  --accent2: #e74c3c;
  --border: #e0ddd5;
  --muted: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 0;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
header {
  text-align: center;
  padding: 30px 0 20px;
  border-bottom: 2px solid var(--accent);
  margin-bottom: 24px;
}
header h1 { font-size: 1.8em; color: var(--accent); }
header p { color: var(--muted); font-size: 0.9em; margin-top: 4px; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn {
  flex: 1;
  min-width: 100px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-size: 0.95em;
  border-radius: 8px 8px 0 0;
  transition: all 0.2s;
  text-align: center;
  font-weight: 500;
}
.tab-btn:hover { background: #f0eeea; }
.tab-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.tab-content { display: none; }
.tab-content.active { display: block; }
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-weight: 600;
  margin-bottom: 6px;
  font-size: 0.95em;
}
input, select, textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 1em;
  background: var(--card);
  transition: border 0.2s;
}
input:focus, select:focus { outline: none; border-color: var(--accent); }
textarea { min-height: 80px; resize: vertical; }
.btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
}
.btn:hover { background: var(--accent2); }
.btn-secondary {
  background: var(--border);
  color: var(--text);
}
.btn-secondary:hover { background: #ccc; }
.row { display: flex; gap: 12px; flex-wrap: wrap; }
.row > * { flex: 1; min-width: 120px; }
.result-box {
  background: #f9f7f4;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-top: 16px;
  min-height: 60px;
  white-space: pre-wrap;
  font-size: 0.95em;
  line-height: 1.7;
}
.result-box:empty { display: none; }
.char-result {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  margin: 4px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.char-result:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(192,57,43,0.15);
}
.char-result .char { font-size: 1.6em; }
.char-result .info { font-size: 0.85em; color: var(--muted); }
.char-result .element-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75em;
  font-weight: 600;
}
.element-木 { background: #c8e6c9; color: #2e7d32; }
.element-火 { background: #ffcdd2; color: #c62828; }
.element-土 { background: #ffe0b2; color: #e65100; }
.element-金 { background: #e0e0e0; color: #37474f; }
.element-水 { background: #b3e5fc; color: #01579b; }
.theme-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75em;
  font-weight: 600;
  background: #e8eaf6;
  color: #283593;
  margin-left: 4px;
}
.detail-panel {
  background: linear-gradient(135deg, #fafafa 0%, #f5f0eb 100%);
  border: 2px solid var(--accent);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
}
.detail-panel h3 { color: var(--accent); margin-bottom: 12px; }
.detail-panel .detail-row { display: flex; margin-bottom: 8px; }
.detail-panel .detail-label { font-weight: 600; width: 120px; color: var(--muted); }
.detail-panel .detail-value { flex: 1; }
.loading { opacity: 0.5; pointer-events: none; }
footer {
  text-align: center;
  color: var(--muted);
  font-size: 0.85em;
  padding: 30px 0 20px;
  border-top: 1px solid var(--border);
  margin-top: 30px;
}
.search-filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.search-filters > * { flex: 1; min-width: 150px; }
.count-badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8em;
}
@media (max-width: 600px) {
  .container { padding: 12px; }
  header h1 { font-size: 1.4em; }
  .card { padding: 16px; }
  .tabs { flex-direction: column; }
  .tab-btn { border-radius: 8px; min-width: auto; }
  .row { flex-direction: column; }
  .search-filters { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📜 Chinese Name Converter</h1>
    <p>Pinyin · Meanings · Element Balance · 五行 Analysis</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pinyin')">🔤 Pinyin</button>
    <button class="tab-btn" onclick="switchTab('meaning')">📖 Meaning</button>
    <button class="tab-btn" onclick="switchTab('analyze')">🔍 Name Analysis</button>
    <button class="tab-btn" onclick="switchTab('search')">🔎 Search</button>
  </div>

  <!-- TAB 1: PINYIN -->
  <div id="tab-pinyin" class="tab-content active">
    <div class="card">
      <div class="form-group">
        <label for="pinyin-input">Enter Chinese text</label>
        <input type="text" id="pinyin-input" placeholder="e.g. 张伟明" oninput="convertPinyin()">
      </div>
      <div class="row">
        <label class="form-group" style="flex-direction:row;align-items:center;gap:6px">
          <input type="checkbox" id="pinyin-notone" onchange="convertPinyin()"> No tone marks
        </label>
        <label class="form-group" style="flex-direction:row;align-items:center;gap:6px">
          <input type="checkbox" id="pinyin-caps" onchange="convertPinyin()"> Capitalize
        </label>
        <label class="form-group" style="flex-direction:row;align-items:center;gap:6px">
          <input type="checkbox" id="pinyin-meaning" onchange="convertPinyin()"> Show meanings
        </label>
      </div>
      <div id="pinyin-result" class="result-box"></div>
    </div>
  </div>

  <!-- TAB 2: MEANING -->
  <div id="tab-meaning" class="tab-content">
    <div class="card">
      <div class="form-group">
        <label for="meaning-input">Enter Chinese character(s)</label>
        <input type="text" id="meaning-input" placeholder="e.g. 伟" oninput="showMeaning()">
      </div>
      <label class="form-group" style="flex-direction:row;align-items:center;gap:6px">
        <input type="checkbox" id="meaning-deep" onchange="showMeaning()"> Deep analysis
      </label>
      <div id="meaning-result" class="result-box"></div>
    </div>
  </div>

  <!-- TAB 3: NAME ANALYSIS -->
  <div id="tab-analyze" class="tab-content">
    <div class="card">
      <div class="form-group">
        <label for="name-input">Enter a full Chinese name</label>
        <input type="text" id="name-input" placeholder="e.g. 张伟明" oninput="analyzeName()">
      </div>
      <div id="name-result" class="result-box"></div>
    </div>
  </div>

  <!-- TAB 4: SEARCH -->
  <div id="tab-search" class="tab-content">
    <div class="card">
      <div class="form-group">
        <label for="search-query">Search by meaning, pinyin, or notes</label>
        <input type="text" id="search-query" placeholder="e.g. great, jade, mountain..." oninput="doSearch()">
      </div>
      <div class="search-filters">
        <div class="form-group">
          <label for="search-element">Element (五行)</label>
          <select id="search-element" onchange="doSearch()">
            <option value="">Any</option>
            <option value="木">Wood 木</option>
            <option value="火">Fire 火</option>
            <option value="土">Earth 土</option>
            <option value="金">Metal 金</option>
            <option value="水">Water 水</option>
          </select>
        </div>
        <div class="form-group">
          <label for="search-theme">Theme</label>
          <select id="search-theme" onchange="doSearch()">
            <option value="">Any</option>
            <option value="strength">Strength</option>
            <option value="wisdom">Wisdom</option>
            <option value="beauty">Beauty</option>
            <option value="nature">Nature</option>
            <option value="virtue">Virtue</option>
            <option value="prosperity">Prosperity</option>
            <option value="gentle">Gentle</option>
            <option value="talent">Talent</option>
            <option value="family">Family</option>
          </select>
        </div>
      </div>
      <div id="search-results-info"></div>
      <div id="search-results" class="result-box"></div>
    </div>
  </div>

  <footer>
    Chinese Name Converter — 中文名转换器 · Built with ♥
  </footer>
</div>

<script>
// ── CHARACTER DICTIONARY (embedded) ──

const DICT = {};

// Load from inline data
const DICT_DATA = `PASTE_DICT_HERE`;

// We'll load the dictionary via a helper
let dictLoaded = false;

function loadDict() {
  if (dictLoaded) return;
  // Parse inline JSON
  const data = document.getElementById('dict-data')?.textContent;
  if (data) {
    try {
      const parsed = JSON.parse(data);
      Object.assign(DICT, parsed);
    } catch(e) {
      console.error('Dict parse error:', e);
    }
  }
  dictLoaded = true;
}

// ── SURNAMES (top ~100) ──
const SURNAMES = new Set([
  "赵","钱","孙","李","周","吴","郑","王","冯","陈","褚","卫","蒋","沈",
  "韩","杨","朱","秦","许","何","吕","施","张","孔","曹","严","华",
  "金","魏","陶","姜","谢","邹","喻","柏","水","窦","章","云","苏",
  "潘","葛","范","彭","郎","鲁","韦","昌","马","苗","凤","花","方","俞",
  "任","袁","柳","酆","鲍","史","唐","费","廉","岑","薛","雷","贺","倪",
  "汤","滕","殷","罗","毕","郝","邬","安","常","乐","于","时","傅","皮",
  "卞","齐","康","伍","余","元","卜","顾","孟","平","黄","和","穆","萧",
  "尹","姚","邵","湛","汪","祁","毛","禹","狄","米","贝","明","臧","计",
  "伏","成","戴","谈","宋","茅","庞","熊","纪","舒","屈","项","祝","董",
  "梁","杜","阮","蓝","闵","席","季","麻","强","贾","路","娄","危","江",
  "童","颜","郭","梅","盛","林","刁","钟","徐","邱","骆","高","夏","蔡",
  "田","樊","胡","凌","霍","虞","万","支","柯","管","卢","莫","经",
  "房","裘","缪","干","解","应","宗","丁","宣","邓","郁","单","杭",
  "洪","包","诸","左","石","崔","吉","钮","龚","程","嵇","邢","滑","裴",
  "陆","荣","翁","荀","羊","於","惠","甄","曲","家","封","芮","储",
  "靳","汲","邴","糜","松","井","段","富","巫","乌","焦","巴","牧",
  "山","谷","车","侯","宓","蓬","全","郗","班","仰","秋","仲","伊",
  "宫","宁","仇","栾","暴","甘","厉","戎","祖","武","符","刘","景",
  "詹","束","龙","叶","幸","司","韶","郜","黎","蓟","薄","印","宿","白",
  "怀","蒲","邰","从","鄂","索","籍","赖","卓","蔺","屠","蒙","池",
  "乔","阴","郁","胥","苍","双","闻","莘","党","翟","谭","贡","劳",
  "姬","申","扶","堵","冉","宰","郦","雍","桑","桂","濮",
  "牛","寿","通","边","扈","燕","冀","浦","尚","农","温","别","庄",
  "晏","柴","瞿","阎","充","慕","连","茹","习","宦","艾","鱼","容","向",
  "古","易","慎","戈","廖","庾","终","暨","居","衡","步","都","耿","满",
  "弘","匡","国","文","寇","广","禄","阙","东","欧","沃","利","蔚",
  "越","隆","师","巩","厍","聂","晁","勾","敖","融","冷","訾","辛",
  "阚","那","简","饶","空","曾","毋","沙","养","鞠","须","丰","巢",
  "关","蒯","相","查","后","荆","红","游","竺","权","盖","桓",
  "司马","上官","欧阳","夏侯","诸葛","东方","皇甫","尉迟","公孙","慕容","司徒","司空"
]);

const ELEMENT_LABELS = {"木":"Wood 🌳","火":"Fire 🔥","土":"Earth 🏔️","金":"Metal ⚔️","水":"Water 🌊"};
const GENDER_SYMS = {"M":"♂️","F":"♀️","unisex":"⚧️"};

// ── TONE MARKS for pinyin conversion ──
// Simple tone conversion map (pypinyin replacement)
const TONE_MAP = {
  'a': 'āáǎà', 'e': 'ēéěè', 'i': 'īíǐì', 'o': 'ōóǒò', 'u': 'ūúǔù', 'v': 'ǖǘǚǜ'
};
// Reverse
const REV_TONE = {};
for (const [base, tones] of Object.entries(TONE_MAP)) {
  for (let t = 0; t < tones.length; t++) {
    REV_TONE[tones[t]] = {base, tone: t+1};
  }
}

function getPinyin(text, noTone, caps) {
  // Use stored pinyin from dictionary if available
  let result = [];
  for (const ch of text) {
    const info = DICT[ch];
    if (info && info.pinyin) {
      result.push(info.pinyin);
    } else {
      // Fallback: try to guess from character
      result.push(ch);
    }
  }
  let output = result.join(' ');
  if (noTone) {
    // Strip tone marks
    let s = '';
    for (const c of output) {
      let found = false;
      for (const [base, tones] of Object.entries(TONE_MAP)) {
        const idx = tones.indexOf(c);
        if (idx >= 0) { s += base; found = true; break; }
      }
      if (!found) s += c;
    }
    output = s;
  }
  if (caps) {
    output = output.replace(/(\S+)/g, (m) => {
      const first = m[0];
      let upFirst = first.toUpperCase();
      // Handle accented first letter
      for (const [base, tones] of Object.entries(TONE_MAP)) {
        const idx = tones.indexOf(first);
        if (idx >= 0) { upFirst = base.toUpperCase(); break; }
      }
      return upFirst + m.slice(1);
    });
  }
  return output;
}

function getSurname(name) {
  if (name.length >= 2 && SURNAMES.has(name.slice(0,2))) return name.slice(0,2);
  if (name.length >= 1 && SURNAMES.has(name[0])) return name[0];
  return null;
}

// ── TAB SWITCHING ──
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
}

// ── FEATURE A: PINYIN ──
function convertPinyin() {
  loadDict();
  const text = document.getElementById('pinyin-input').value.trim();
  if (!text) { document.getElementById('pinyin-result').innerHTML = ''; return; }
  const noTone = document.getElementById('pinyin-notone').checked;
  const caps = document.getElementById('pinyin-caps').checked;
  const showMeaning = document.getElementById('pinyin-meaning').checked;

  const surname = getSurname(text);
  const surLen = surname ? surname.length : 0;
  const given = text.slice(surLen);

  let lines = [];
  if (showMeaning) {
    let allChars = text.split('');
    for (let i = 0; i < allChars.length; i++) {
      const ch = allChars[i];
      const info = DICT[ch];
      const py = getPinyin(ch, noTone, caps);
      const label = (surname && i < surLen) ? '(surname)' : '';
      if (info) {
        const meanings = info.meanings.slice(0,2).join(', ');
        lines.push(`<span class="char-result"><span class="char">${ch}</span><span class="info">${py} ${label} — ${meanings} ${info.emoji||''}</span></span>`);
      } else {
        lines.push(`<span class="char-result"><span class="char">${ch}</span><span class="info">${py} ${label}</span></span>`);
      }
    }
    // Also show full pinyin
    const fullPy = getPinyin(text, noTone, caps);
    lines.unshift(`<div style="font-size:1.2em;margin-bottom:8px;font-weight:600">${fullPy}</div>`);
  } else {
    const fullPy = getPinyin(text, noTone, caps);
    lines.push(`<div style="font-size:1.3em">${fullPy}</div>`);
  }
  document.getElementById('pinyin-result').innerHTML = lines.join('\n');
}

// ── FEATURE B: MEANING ──
function showMeaning() {
  loadDict();
  const text = document.getElementById('meaning-input').value.trim();
  if (!text) { document.getElementById('meaning-result').innerHTML = ''; return; }
  const deep = document.getElementById('meaning-deep').checked;

  let html = '';
  for (const ch of text) {
    const info = DICT[ch];
    if (!info) {
      html += `<div class="detail-panel"><p>Character '${ch}' not found in dictionary.</p></div>`;
      continue;
    }
    const elemLabel = ELEMENT_LABELS[info.element] || info.element;
    const genderSym = GENDER_SYMS[info.gender] || '';
    const meanings = info.meanings.join(', ');
    const themeLabel = info.theme.charAt(0).toUpperCase() + info.theme.slice(1);

    html += `<div class="detail-panel">
      <h3>${ch} (${info.pinyin}) ${info.emoji||''}</h3>
      <div class="detail-row"><span class="detail-label">Meanings</span><span class="detail-value">${meanings}</span></div>
      <div class="detail-row"><span class="detail-label">Element</span><span class="detail-value"><span class="element-badge element-${info.element}">${elemLabel}</span></span></div>
      <div class="detail-row"><span class="detail-label">Theme</span><span class="detail-value"><span class="theme-badge">${themeLabel}</span></span></div>
      <div class="detail-row"><span class="detail-label">Gender</span><span class="detail-value">${info.gender ? info.gender.charAt(0).toUpperCase()+info.gender.slice(1) : 'Unisex'} ${genderSym}</span></div>
      ${info.notes ? `<div class="detail-row"><span class="detail-label">Note</span><span class="detail-value">${info.notes}</span></div>` : ''}`;

    if (deep) {
      const elemDesc = {
        '木': 'Wood — growth, flexibility, creativity, vitality',
        '火': 'Fire — passion, brightness, transformation, energy',
        '土': 'Earth — stability, nurturing, reliability, balance',
        '金': 'Metal — strength, structure, refinement, determination',
        '水': 'Water — wisdom, adaptability, depth, flow'
      };
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <strong>Extended Analysis</strong>
        <p style="margin-top:6px;color:#555">This character expresses: ${meanings}.</p>
        <p style="color:#555">${elemDesc[info.element] || ''}</p>
        <p style="color:#555">Theme: ${themeLabel} — suitable for names expressing ${info.theme}.</p>
        <p style="color:#555">${info.notes || ''}</p>`;
      // Common name patterns
      const patterns = {
        'strength': `Common patterns: 勇${ch}, ${ch}强, ${ch}杰`,
        'beauty': `Common patterns: 美${ch}, ${ch}丽, 秀${ch}`,
        'wisdom': `Common patterns: 智${ch}, ${ch}慧, ${ch}明`,
        'nature': `Common patterns: ${ch}林, 海${ch}, 云${ch}`,
        'virtue': `Common patterns: 德${ch}, ${ch}义, 仁${ch}`,
        'prosperity': `Common patterns: 富${ch}, ${ch}贵, ${ch}荣`
      };
      html += `<p style="color:#555;margin-top:6px">${patterns[info.theme] || `${ch} is a popular choice in compound names.`}</p>`;
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('meaning-result').innerHTML = html;
}

// ── FEATURE C: NAME ANALYSIS ──
function analyzeName() {
  loadDict();
  const text = document.getElementById('name-input').value.trim();
  if (!text) { document.getElementById('name-result').innerHTML = ''; return; }

  const surname = getSurname(text);
  const surLen = surname ? surname.length : 0;
  const given = text.slice(surLen);
  const fullPy = getPinyin(text, false, true);

  let html = `<div class="detail-panel" style="border-color:#555">
    <h3>📋 Name Analysis: ${text}</h3>
    <div class="detail-row"><span class="detail-label">Pinyin</span><span class="detail-value" style="font-size:1.2em">${fullPy}</span></div>`;

  if (surname) {
    html += `<div class="detail-row"><span class="detail-label">Surname</span><span class="detail-value">${surname} (${getPinyin(surname, false, true)})</span></div>`;
    html += `<div class="detail-row"><span class="detail-label">Given</span><span class="detail-value">${given} (${getPinyin(given, false, true)})</span></div>`;
  }

  html += `<hr style="margin:12px 0;border-color:var(--border)"><strong>Character Breakdown</strong>`;

  const themes = [];
  const elements = [];

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const info = DICT[ch];
    const label = (surname && i < surLen) ? 'Surname' : 'Given';
    if (info) {
      const elemLabel = ELEMENT_LABELS[info.element] || info.element;
      const meanings = info.meanings.join(', ');
      html += `<div style="margin:8px 0;padding:8px;background:rgba(0,0,0,0.02);border-radius:6px">
        <strong>${ch}</strong> (${info.pinyin}) [${label}]
        <div style="font-size:0.9em;color:#555">${meanings}</div>
        <div style="font-size:0.9em"><span class="element-badge element-${info.element}">${elemLabel}</span> <span class="theme-badge">${info.theme}</span> ${info.emoji||''}</div>
      </div>`;
      themes.push(info.theme);
      elements.push(info.element);
    } else {
      html += `<div style="margin:8px 0;padding:8px;background:rgba(0,0,0,0.02);border-radius:6px">
        <strong>${ch}</strong> (${getPinyin(ch, false, true)}) [${label}] — not in dictionary
      </div>`;
    }
  }

  // Overall analysis
  if (themes.length > 0) {
    html += `<hr style="margin:12px 0;border-color:var(--border)"><strong>Overall Analysis</strong>`;

    // Count themes
    const themeCounts = {};
    themes.forEach(t => { themeCounts[t] = (themeCounts[t] || 0) + 1; });
    const primaryTheme = Object.entries(themeCounts).sort((a,b) => b[1]-a[1])[0][0];
    html += `<div style="margin-top:8px">Primary Theme: <span class="theme-badge">${primaryTheme.charAt(0).toUpperCase()+primaryTheme.slice(1)}</span></div>`;

    // Element balance
    if (elements.length > 0) {
      html += `<div style="margin-top:12px"><strong>Element Balance (五行)</strong></div>`;
      const elemCounts = {};
      elements.forEach(e => { elemCounts[e] = (elemCounts[e] || 0) + 1; });
      const total = elements.length;
      for (const elem of ['木','火','土','金','水']) {
        const count = elemCounts[elem] || 0;
        const pct = (count / total * 100).toFixed(0);
        const barW = Math.max(count * 30, count > 0 ? 30 : 4);
        html += `<div style="display:flex;align-items:center;gap:8px;margin:4px 0">
          <span style="width:100px">${ELEMENT_LABELS[elem] || elem}</span>
          <div style="flex:1;height:20px;background:#eee;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${barW}px;background:${elem==='木'?'#4caf50':elem==='火'?'#f44336':elem==='土'?'#ff9800':elem==='金'?'#9e9e9e':'#03a9f4'};border-radius:4px"></div>
          </div>
          <span>${count}/${total} (${pct}%)</span>
        </div>`;
      }

      // Balance score
      const uniqueElems = Object.keys(elemCounts).length;
      let score;
      if (uniqueElems >= 3) score = '⚖️ Well-balanced';
      else if (uniqueElems === 2) score = '🔶 Moderately balanced';
      else score = '🔴 Concentrated';
      html += `<div style="margin-top:8px;font-weight:600">Element Balance Score: ${score}</div>`;

      // Dominant
      const maxElem = Object.entries(elemCounts).sort((a,b) => b[1]-a[1])[0][0];
      const generating = {'木':'火','火':'土','土':'金','金':'水','水':'木'};
      html += `<div style="margin-top:4px;font-size:0.9em;color:#555">Dominant: ${ELEMENT_LABELS[maxElem]} → Generates: ${ELEMENT_LABELS[generating[maxElem]]}</div>`;
    }
  }

  html += `</div>`;
  document.getElementById('name-result').innerHTML = html;
}

// ── FEATURE D: SEARCH ──
function doSearch() {
  loadDict();
  const query = document.getElementById('search-query').value.toLowerCase().trim();
  const element = document.getElementById('search-element').value;
  const theme = document.getElementById('search-theme').value;

  const results = [];
  for (const [ch, info] of Object.entries(DICT)) {
    let match = true;
    if (query) {
      const meanings = (info.meanings || []).join(' ').toLowerCase();
      const notes = (info.notes || '').toLowerCase();
      const pinyin = info.pinyin.toLowerCase();
      if (!meanings.includes(query) && !notes.includes(query) && !pinyin.includes(query)) {
        match = false;
      }
    }
    if (element && info.element !== element) match = false;
    if (theme && info.theme !== theme) match = false;
    if (match) results.push(ch);
  }

  // Deduplicate
  const seen = new Set();
  const unique = [];
  for (const ch of results) {
    if (!seen.has(ch)) { seen.add(ch); unique.push(ch); }
  }

  const infoEl = document.getElementById('search-results-info');
  const resultEl = document.getElementById('search-results');

  if (unique.length === 0) {
    infoEl.innerHTML = '<p style="color:var(--muted)">No matching characters found.</p>';
    resultEl.innerHTML = '';
    return;
  }

  infoEl.innerHTML = `<p>Found <strong>${unique.length}</strong> matching character(s). Click a character for details.</p>`;

  // Group by theme
  const groups = {};
  for (const ch of unique) {
    const info = DICT[ch];
    const t = info.theme || 'other';
    if (!groups[t]) groups[t] = [];
    groups[t].push(ch);
  }

  let html = '';
  for (const themeName of Object.keys(groups).sort()) {
    html += `<div style="margin-bottom:12px"><strong style="font-size:0.95em">${themeName.charAt(0).toUpperCase()+themeName.slice(1)}</strong><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">`;
    for (const ch of groups[themeName]) {
      const info = DICT[ch];
      html += `<span class="char-result" onclick="showCharDetail('${ch}')" style="cursor:pointer">
        <span class="char">${ch}</span>
        <span class="info">${info.pinyin}<br><span class="element-badge element-${info.element}" style="font-size:0.7em">${ELEMENT_LABELS[info.element]||info.element}</span></span>
      </span>`;
    }
    html += `</div></div>`;
  }

  resultEl.innerHTML = html;
}

function showCharDetail(ch) {
  switchTab('meaning');
  document.getElementById('meaning-input').value = ch;
  showMeaning();
  document.getElementById('meaning-input').focus();
}
