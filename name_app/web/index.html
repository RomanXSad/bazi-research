<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Chinese Name Converter">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Name Converter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Name Converter</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="main.dart.js" as="script" crossorigin="anonymous">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#faf3e6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    
    #loader{text-align:center;transition:opacity .5s;max-width:90vw}
    #loader.hide{opacity:0;pointer-events:none}
    
    .logo-wrap{position:relative;width:100px;height:100px;margin:0 auto 16px}
    .logo-ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;
      border-top-color:#4CAF50;border-right-color:#FF5722;border-bottom-color:#FFC107;
      border-left-color:#2196F3;animation:spin 1.6s cubic-bezier(.4,0,.2,1) infinite}
    .logo-ring2{position:absolute;inset:8px;border-radius:50%;border:2px solid transparent;
      border-top-color:#9E9E9E;border-bottom-color:#FF5722;animation:spin 2.2s infinite reverse}
    .logo-char{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px}
    
    .title{font-size:20px;font-weight:800;color:#3e2723;margin-bottom:2px}
    .sub{font-size:13px;color:#6d4c41;margin-bottom:20px}
    
    .spinner{display:flex;gap:7px;justify-content:center;margin-bottom:12px}
    .spinner div{width:12px;height:12px;border-radius:50%;animation:bounce 1.3s ease-in-out infinite}
    .spinner div:nth-child(1){background:#4CAF50;animation-delay:0s}
    .spinner div:nth-child(2){background:#FF5722;animation-delay:.18s}
    .spinner div:nth-child(3){background:#FFC107;animation-delay:.36s}
    .spinner div:nth-child(4){background:#9E9E9E;animation-delay:.54s}
    .spinner div:nth-child(5){background:#2196F3;animation-delay:.72s}
    
    .status{font-size:12px;color:#8b7d6b}
    
    @keyframes bounce{0%,80%,100%{transform:scale(.6)}40%{transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loader">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-ring2"></div>
      <div class="logo-char">🀄</div>
    </div>
    <div class="title">Name Converter</div>
    <div class="sub">中文 · 拼音 · 五行</div>
    <div class="spinner">
      <div></div><div></div><div></div><div></div><div></div>
    </div>
    <div class="status">Loading...</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('loader');
      if(el) el.classList.add('hide');
    });
    setTimeout(() => {
      const el = document.getElementById('loader');
      if(el && !el.classList.contains('hide')) el.classList.add('hide');
    }, 12000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
