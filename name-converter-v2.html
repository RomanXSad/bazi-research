*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#faf6f0;color:#2c1810;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:16px}

/* Header */
header{text-align:center;padding:20px 0 12px}
h1{font-size:22px;background:linear-gradient(135deg,#c0392b,#8e44ad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:#8b7d6b;margin-top:2px}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.controls input{flex:1;min-width:140px;padding:10px 14px;border:2px solid #e0d5c8;border-radius:10px;font-size:16px;background:#fff;outline:none;transition:.2s}
.controls input:focus{border-color:#c0392b;box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.controls select{padding:10px 12px;border:2px solid #e0d5c8;border-radius:10px;font-size:14px;background:#fff;cursor:pointer}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-primary{background:#c0392b;color:#fff}
.btn-primary:hover{background:#a93226;transform:translateY(-1px)}
.btn-demo{background:#2c3e50;color:#fff}
.btn-demo:hover{background:#1a252f;transform:translateY(-1px)}
.btn-demo.active{background:#e74c3c}
.btn-demo.active:hover{background:#c0392b}

/* Results */
#result{margin-top:12px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);opacity:1;transition:opacity .3s,transform .3s}
.card.fade{opacity:0;transform:translateY(8px)}

/* Name header */
.name-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.name-display{font-size:28px;font-weight:700;color:#1a1a1a}
.name-pinyin{font-size:15px;color:#8b7d6b}
.name-pinyin .tone-num{color:#999;font-size:12px;margin-left:2px}

/* Char cards */
.char-grid{display:flex;gap:8px;flex-wrap:wrap}
.char-card{flex:1;min-width:120px;background:#faf6f0;border-radius:10px;padding:12px;text-align:center;border:1px solid #e8e0d4}
.char-card .hanzi{font-size:30px;font-weight:700;margin-bottom:4px}
.char-card .pinyin-sm{font-size:13px;color:#666;margin-bottom:3px}
.char-card .meaning{font-size:13px;color:#333;font-weight:500}
.char-card .element{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-top:4px;color:#fff}
.elem-木{background:#4CAF50} .elem-火{background:#FF5722} .elem-土{background:#FF9800}
.elem-金{background:#78909C} .elem-水{background:#2196F3} .elem-山{background:#795548}

/* Element bars */
.elem-bar-wrap{margin-top:10px}
.elem-bar-title{font-size:12px;color:#8b7d6b;margin-bottom:4px}
.elem-bar{display:flex;height:8px;border-radius:4px;overflow:hidden}
.elem-bar div{transition:width .4s}

/* Details section */
.details{margin-top:10px}
.detail-row{display:flex;gap:12px;font-size:13px;padding:4px 0;border-bottom:1px solid #f0ebe4}
.detail-row:last-child{border:none}
.detail-label{color:#8b7d6b;min-width:60px}
.detail-value{color:#2c1810}
.detail-value .pill{display:inline-block;padding:0 6px;border-radius:8px;font-size:11px;font-weight:600;color:#fff;margin-right:3px}

/* Theme tags */
.theme-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.theme-tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;background:#f0ebe4;color:#5a4a3a}

/* Demo progress */
.demo-bar{height:3px;background:#e0d5c8;border-radius:2px;margin-top:8px;overflow:hidden}
.demo-bar-inner{height:100%;background:linear-gradient(90deg,#c0392b,#8e44ad);width:0;transition:width .3s linear;border-radius:2px}

/* Demo name counter */
.demo-info{text-align:center;font-size:12px;color:#8b7d6b;margin-top:6px}

/* Summary box */
.summary-box{background:linear-gradient(135deg,#fdf2e9,#fef9f4);border-radius:10px;padding:12px;margin-top:8px;border:1px solid #f0e4d8}
.summary-box .title{font-size:12px;font-weight:600;color:#8b7d6b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.summary-box .text{font-size:14px;color:#2c1810}

/* Transitions */
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:slideIn .35s ease}

/* Footer */
footer{text-align:center;padding:20px 0;font-size:12px;color:#b8a898}

/* Responsive */
@media(max-width:480px){
  .container{padding:10px}
  h1{font-size:18px}
  .name-display{font-size:24px}
  .char-card{min-width:90px;padding:8px}
  .char-card .hanzi{font-size:24px}
  .controls input{min-width:100px}
}
</style>

  '黄':'huáng','丽':'lì','娜':'nà','周':'zhōu','文':'wén','杰':'jié',
  '吴':'wú','秀':'xiù','英':'yīng','徐':'xú','孙':'sūn','马':'mǎ',
  '朱':'zhū','胡':'hú','何':'hé','郭':'guō','高':'gāo','罗':'luó',
  '梁':'liáng','宋':'sòng','唐':'táng','韩':'hán','曹':'cáo','许':'xǔ',
  '邓':'dèng','萧':'xiāo','冯':'féng','程':'chéng','蔡':'cài','潘':'pān',
  '袁':'yuán','董':'dǒng','于':'yú','余':'yú','叶':'yè','蒋':'jiǎng',
  '沈':'shěn','韩':'hán','任':'rèn','姚':'yáo','卢':'lú','傅':'fù',
  '钟':'zhōng','崔':'cuī','汪':'wāng','陆':'lù','戴':'dài','范':'fàn',
  '方':'fāng','石':'shí','廖':'liào','熊':'xióng','金':'jīn','谭':'tán',
  '夏':'xià','韦':'wéi','贾':'jiǎ','邹':'zōu','石':'shí','秦':'qín',
  '薛':'xuē','邱':'qiū','江':'jiāng','傅':'fù'
};

function getPinyin(char, toneNum=false) {
  if (DICT[char]) return DICT[char].pinyin;
  if (FALLBACK_PINYIN[char]) return FALLBACK_PINYIN[char];
  return '';
}

function stripTone(py) {
  const map = {
    'ā':'a','á':'a','ǎ':'a','à':'a','ē':'e','é':'e','ě':'e','è':'e',
    'ī':'i','í':'i','ǐ':'i','ì':'i','ō':'o','ó':'o','ǒ':'o','ò':'o',
    'ū':'u','ú':'u','ǔ':'u','ù':'u','ǖ':'v','ǘ':'v','ǚ':'v','ǜ':'v',
    'Ā':'A','Á':'A','Ǎ':'A','À':'A','Ē':'E','É':'E','Ě':'E','È':'E',
    'Ī':'I','Í':'I','Ǐ':'I','Ì':'I','Ō':'O','Ó':'O','Ǒ':'O','Ò':'O',
    'Ū':'U','Ú':'U','Ǔ':'U','Ù':'U','Ǖ':'V','Ǘ':'V','Ǚ':'V','Ǜ':'V',
    'ü':'v','Ü':'V'
  };
  return py.split('').map(c=>map[c]||c).join('');
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function nameToPinyin(name, opts={}) {
  const chars = [...name];
  const syllables = chars.map(c => {
    const py = getPinyin(c);
    if (!py) return {char:c, pinyin:''};
    let p = opts.noTone ? stripTone(py) : py;
    if (opts.caps) p = capitalize(p);
    return {char:c, pinyin:p, entry:DICT[c]};
  });
  return {
    full: syllables.map(s=>s.pinyin).join(' '),
    surname: syllables[0],
    given: syllables.slice(1),
    syllables
  };
}

// ═══════════════════════════════════════════════════════
// DEMO — 10 names in a loop
// ═══════════════════════════════════════════════════════

const DEMO_NAMES = [
  { name: '张伟明', desc: 'Zhang Weiming — Great Brightness' },
  { name: '李慧琳', desc: 'Li Huilin — Wise Jade' },
  { name: '王强', desc: 'Wang Qiang — Mighty King' },
  { name: '陈雅婷', desc: 'Chen Yating — Elegant Grace' },
  { name: '刘志强', desc: 'Liu Zhiqiang — Strong Will' },
  { name: '杨晓慧', desc: 'Yang Xiaohui — Dawn Wisdom' },
  { name: '赵睿博', desc: 'Zhao Ruibo — Astute & Learned' },
  { name: '黄丽娜', desc: 'Huang Lina — Beautiful & Elegant' },
  { name: '周文杰', desc: 'Zhou Wenjie — Literary Hero' },
  { name: '吴秀英', desc: 'Wu Xiuying — Elegant & Heroic' }
];

let demoRunning = false;
let demoIdx = 0;
let demoTimer = null;

function toggleDemo() {
  const btn = document.getElementById('demoBtn');
  if (demoRunning) {
    stopDemo();
    btn.textContent = '▶ Demo';
    btn.classList.remove('active');
  } else {
    startDemo();
    btn.textContent = '⏸ Stop';
    btn.classList.add('active');
  }
}

function startDemo() {
  demoRunning = true;
  demoIdx = 0;
  document.getElementById('demoInfo').style.display = 'block';
  document.getElementById('demoBar').style.display = 'block';
  showDemoName(0);
  demoTimer = setInterval(() => {
    demoIdx = (demoIdx + 1) % DEMO_NAMES.length;
    showDemoName(demoIdx);
  }, 4000);
}

function stopDemo() {
  demoRunning = false;
  if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
  document.getElementById('demoInfo').style.display = 'none';
  document.getElementById('demoBar').style.display = 'none';
}

function showDemoName(idx) {
  const d = DEMO_NAMES[idx];
  document.getElementById('nameInput').value = d.name;
  // Update demo info
  document.getElementById('demoInfo').textContent =
    `${idx+1}/${DEMO_NAMES.length} · ${d.desc}`;
  // Animate progress bar
  const pct = ((idx+1) / DEMO_NAMES.length) * 100;
  document.getElementById('demoBarInner').style.width = pct + '%';
  // Run analysis
  analyze();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function analyze() {
  const input = document.getElementById('nameInput').value.trim();
  const mode = document.getElementById('modeSelect').value;
  const result = document.getElementById('result');
  if (!input) { result.innerHTML = ''; return; }

  const chars = [...input];
  const syllables = chars.map(c => ({
    char: c,
    pinyin: getPinyin(c),
    entry: DICT[c] || null
  }));

  // Build pinyin string
  let pinyinStr = syllables.map(s => {
    let py = s.pinyin;
    if (!py) return '?';
    return capitalize(stripTone(py));
  }).join(' ');

  // Element distribution
  const elemCount = {木:0,火:0,土:0,金:0,水:0,山:0};
  let knownChars = 0;
  syllables.forEach(s => {
    if (s.entry && s.entry.element) {
      if (elemCount[s.entry.element] !== undefined) {
        elemCount[s.entry.element]++;
        knownChars++;
      }
    }
  });

  // Themes
  const themes = {};
  syllables.forEach(s => {
    if (s.entry && s.entry.theme) {
      themes[s.entry.theme] = (themes[s.entry.theme]||0) + 1;
    }
  });

  // Build HTML
  let html = '';

  // Name header
  html += `<div class="card animate">`;
  html += `<div class="name-header">`;
  html += `<span class="name-display">${input}</span>`;
  html += `<span class="name-pinyin">${pinyinStr}</span>`;
  html += `</div>`;

  // Character cards
  html += `<div class="char-grid">`;
  syllables.forEach(s => {
    html += `<div class="char-card">`;
    html += `<div class="hanzi">${s.char}</div>`;
    if (s.pinyin) {
      html += `<div class="pinyin-sm">${capitalize(stripTone(s.pinyin))}</div>`;
    }
    if (s.entry) {
      const m = s.entry.meanings.slice(0, 2).join(' · ');
      html += `<div class="meaning">${s.entry.emoji} ${m}</div>`;
      const el = s.entry.element;
      html += `<div class="element elem-${el}">${el === '山' ? '⛰️' : el}</div>`;
    } else {
      html += `<div class="meaning" style="color:#999">Not in dictionary</div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  // Element distribution bars
  if (knownChars > 0) {
    html += `<div class="elem-bar-wrap">`;
    html += `<div class="elem-bar-title">⚖️ Element Balance (${knownChars} chars known)</div>`;
    html += `<div class="elem-bar">`;
    const maxCount = Math.max(...Object.values(elemCount), 1);
    const elemColors = {木:'#4CAF50',火:'#FF5722',土:'#FF9800',金:'#78909C',水:'#2196F3',山:'#795548'};
    const order = ['木','火','土','金','水','山'];
    order.forEach(el => {
      if (elemCount[el] > 0) {
        const w = (elemCount[el] / maxCount) * 100;
        html += `<div style="width:${w}%;background:${elemColors[el]};height:8px" title="${el}: ${elemCount[el]}"></div>`;
      }
    });
    html += `</div>`;
    html += `<div style="display:flex;gap:8px;font-size:11px;color:#8b7d6b;margin-top:3px;flex-wrap:wrap">`;
    order.forEach(el => {
      if (elemCount[el] > 0) {
        html += `<span style="display:flex;align-items:center;gap:2px"><span style="width:8px;height:8px;border-radius:2px;background:${elemColors[el]};display:inline-block"></span> ${el} ${elemCount[el]}</span>`;
      }
    });
    html += `</div></div>`;

    // Summary
    const dominant = order.reduce((a, b) => elemCount[a] >= elemCount[b] ? a : b);
    const total = Object.values(elemCount).reduce((a,b) => a+b, 0);
    const pct = total > 0 ? Math.round(elemCount[dominant]/total*100) : 0;
    html += `<div class="summary-box">`;
    html += `<div class="title">📊 Analysis</div>`;
    html += `<div class="text">`;
    html += `Dominant element: <strong>${dominant}</strong> (${pct}%) · `;
    html += `${knownChars} char(s) analyzed · `;
    // Theme summary
    const topTheme = Object.entries(themes).sort((a,b) => b[1]-a[1])[0];
    if (topTheme) html += `Theme: <strong>${capitalize(topTheme[0])}</strong>`;
    html += `</div></div>`;
  }

  html += `</div>`; // end card

  // Details card (if meaning mode or full mode)
  if (mode === 'meaning' || mode === 'full' || mode === 'auto') {
    html += `<div class="card animate" style="animation-delay:.1s">`;
    html += `<div style="font-size:13px;font-weight:600;color:#8b7d6b;margin-bottom:8px">🔍 Character Details</div>`;
    syllables.forEach(s => {
      if (!s.entry) return;
      const e = s.entry;
      html += `<div class="detail-row">`;
      html += `<span class="detail-label">${s.char}</span>`;
      html += `<span class="detail-value">`;
      html += `<span class="pill elem-${e.element}">${e.element}</span> `;
      html += `<span style="color:#666">${capitalize(stripTone(e.pinyin))}</span> · `;
      html += `${e.emoji} ${e.meanings.join(', ')}`;
      html += `</span></div>`;
      if (mode === 'full' && e.notes) {
        html += `<div class="detail-row" style="padding-left:72px;font-size:12px;color:#8b7d6b">`;
        html += `${e.notes}`;
        html += `</div>`;
      }
    });
    html += `<div class="theme-tags">`;
    Object.entries(themes).forEach(([t, c]) => {
      html += `<span class="theme-tag">${capitalize(t)} (${c})</span>`;
    });
    html += `</div>`;
    html += `</div>`;
  }

  result.innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('nameInput');
  const mode = document.getElementById('modeSelect');

  // Auto-analyze on input
  input.addEventListener('input', analyze);
  mode.addEventListener('change', analyze);

  // Enter key
  input.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

  // Initial demo — wait, start demo on load
  setTimeout(() => startDemo(), 500);
});
</script>
